services:

  postgres:
    image: postgres:17
    container_name: inventory_postgres

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: inventory_redis

    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend

    container_name: inventory_backend

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    depends_on:
      - postgres  # Updated to match the new service name

  frontend:
    build:
      context: ./frontend

    container_name: inventory_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data:
